version: '3.8'

services:
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: platform_db
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  mongodb:
    image: mongo:latest
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  redis:
    image: redis:alpine
    ports:
      - "6379:6379"

  auth-service:
    build:
      context: .
      dockerfile: auth_service/Dockerfile
    environment:
      DATABASE_URL: mysql+pymysql://root:root_password@mysql/platform_db
      REDIS_URL: redis://redis:6379/0
      MONGODB_URL: mongodb://mongodb:27017
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672//
    depends_on:
      - mysql
    ports:
      - "8001:8000"

  user-service:
    build:
      context: .
      dockerfile: user_service/Dockerfile
    environment:
      DATABASE_URL: mysql+pymysql://root:root_password@mysql/platform_db
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672//
    depends_on:
      - mysql
    ports:
      - "8002:8000"

  orchestrator:
    build:
      context: .
      dockerfile: orchestrator/Dockerfile
    environment:
      DATABASE_URL: mysql+pymysql://root:root_password@mysql/platform_db
      REDIS_URL: redis://redis:6379/0
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672//
      OPENAI_API_KEY: ${OPENAI_API_KEY}
    depends_on:
      - mysql
      - redis
    ports:
      - "8003:8000"

  worker:
    build:
      context: .
      dockerfile: worker/Dockerfile
    environment:
      DATABASE_URL: mysql+pymysql://root:root_password@mysql/platform_db
      REDIS_URL: redis://redis:6379/0
      MONGODB_URL: mongodb://mongodb:27017
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672//
    depends_on:
      - redis
      - mysql
      - mongodb

  audit-service:
    build:
      context: .
      dockerfile: audit_service/Dockerfile
    environment:
      MONGODB_URL: mongodb://mongodb:27017
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672//
    depends_on:
      - mongodb
    ports:
      - "8004:8000"

  notification-service:
    build:
      context: .
      dockerfile: notification/Dockerfile
    ports:
      - "8005:8000"

  api-gateway:
    build:
      context: .
      dockerfile: api_gateway/Dockerfile
    environment:
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672//
    ports:
      - "8000:8000"
    depends_on:
      - auth-service
      - user-service
      - orchestrator

  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq

  prometheus:
    image: prom/prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./observability/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    depends_on:
      - api-gateway
      - orchestrator

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus

volumes:
  mysql_data:
  mongo_data:
  rabbitmq_data:
  prometheus_data:
  grafana_data:
